builds:
  - id: "cli-proxy-api"
    env:
      - CGO_ENABLED=0
    goos:
      # - linux
      # - windows
      # - darwin
      - freebsd
    goarch:
      - amd64
      # - arm64
    main: ./cmd/server/
    binary: cli-proxy-api
    ldflags:
      - -s -w -X main.Version={{.Version}} -X main.Commit={{.ShortCommit}} -X main.BuildDate={{.Date}}

archives:
  - id: "cli-proxy-api"
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format: tar.gz
    # format_overrides:
    #   - goos: windows
    #     format: zip
    files:
      - LICENSE
      - README.md
      - README_CN.md
      - config.example.yaml

checksum:
  name_template: "checksums.txt"

snapshot:
  name_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
